function buildPopupHtml(adcode) {
  var d = poiData[adcode];
  if (!d) return '';
  var h = '<div class="dist-popup">';
  h += '<h3 style="color:' + d.color + '">' + d.name + '</h3>';
  h += '<div class="count">共 ' + d.pois.length + ' 个景点</div>';
  d.pois.forEach(function(poi, i) {
    var navUrl = 'https://uri.amap.com/navigation?to=' + poi.lng + ',' + poi.lat + ',' + encodeURIComponent(poi.name) + '&mode=car&coordinate=gaode&callnative=0';
    var busUrl = 'https://uri.amap.com/navigation?to=' + poi.lng + ',' + poi.lat + ',' + encodeURIComponent(poi.name) + '&mode=bus&coordinate=gaode&callnative=0';
    h += '<div class="poi-item">';
    h += '<div class="poi-body">';
    if (poi.photos && poi.photos.length > 0) {
      h += '<img class="poi-thumb" src="' + poi.photos[0] + '" loading="lazy">';
    }
    h += '<div class="poi-info">';
    h += '<div class="poi-name"><span>' + (i+1) + '. ' + poi.name + '</span>';
    var dist = getDistance(poi.lat, poi.lng);
    if (dist) h += '<span class="poi-distance">' + dist + '</span>';
    h += '</div>';
    var rev = getReview(poi);
    if (rev) h += '<div class="poi-review">“' + rev + '”</div>';
    h += '<div class="poi-meta">';
    if (poi.alevel) h += '<span class="poi-tag alevel">' + poi.alevel + '</span>';
    if (poi.tags) {
      poi.tags.forEach(function(t) { h += '<span class="poi-tag tag">' + t + '</span>'; });
    }
    if (poi.opentime) {
      var _s = isOpen(poi);
      var _st = _s === null ? '' : (_s ? '<span style="color:#2e7d32;font-weight:600">开园中</span> ' : '<span style="color:#c62828;font-weight:600">已闭园</span> ');
      h += '<span class="poi-tag time">' + _st + '🕒 ' + poi.opentime + '</span>';
      h += '<a class="poi-detail-link" onclick="event.stopPropagation();showDetail(\'' + poi.name.replace(/'/g, "&apos;") + '\',\'' + (poi.opentime||'').replace(/'/g, "&apos;") + '\',\'' + (poi.opentime_week||'').replace(/'/g, "&apos;") + '\',\'' + (poi.addr||'').replace(/'/g, "&apos;") + '\',\'' + (poi.tel||'').replace(/'/g, "&apos;") + '\')">详情 &gt;</a>';
    }
    h += '</div>';
    if (poi.addr) h += '<div class="poi-addr">📍 ' + poi.addr + '</div>';
    h += '<div class="poi-btns">';
    h += '<a class="poi-btn btn-nav" href="' + navUrl + '">🚗 驾车导航</a>';
    h += '<a class="poi-btn btn-bus" href="' + busUrl + '">🚌 公交导航</a>';
    if (poi.tel) {
      var telNum = poi.tel.split(';')[0];

    }
    h += '</div>';
    h += '</div></div></div>';
  });

  h += '</div>';
  return h;
}

          if (p.opentime) {

            tags.push('<a class="poi-detail-link" onclick="event.stopPropagation();showDetail(\'' + p.name.replace(/'/g, "&apos;") + '\',\'' + (p.opentime||'').replace(/'/g, "&apos;") + '\',\'' + (p.opentime_week||'').replace(/'/g, "&apos;") + '\',\'' + (p.addr||'').replace(/'/g, "&apos;") + '\',\'' + (p.tel||'').replace(/'/g, "&apos;") + '\')">详情 &gt;</a>');

        (function(code, p) { m.on('popupopen', function(e) {

// --- Open/Closed status ---
function isOpen(poi) {
  if (!poi.opentime) return null;
  if (poi.opentime.indexOf('24小时') >= 0) return true;
  var now = new Date();
  var hm = now.getHours() * 60 + now.getMinutes();
  var m = poi.opentime.match(/(\d{1,2}):(\d{2})\s*[-–]\s*(\d{1,2}):(\d{2})/);
  if (!m) return null;
  var open = parseInt(m[1]) * 60 + parseInt(m[2]);
  var close = parseInt(m[3]) * 60 + parseInt(m[4]);
  if (close <= open) return hm >= open || hm < close;
  return hm >= open && hm < close;
}
function statusHtml(poi) {
  var s = isOpen(poi);
  if (s === null) return '';
  if (s) return '<span class="poi-status open">开园中</span>';
  return '<span class="poi-status closed">已闭园</span>';
}

// --- User location & distance ---
var _userLat = null, _userLng = null, _locWatchId = null, _locPrompted = false;
var _userMarker = null;
var _userLocIcon = L.divIcon({
  className: '',
  html: '<div class="user-loc-marker"><div class="user-loc-label">您在这</div><div class="user-loc-pin"></div></div>',
  iconSize: [60, 44],
  iconAnchor: [30, 40]
});
// WGS-84 to GCJ-02 conversion (browser returns WGS-84, Gaode tiles use GCJ-02)
function _wgs2gcj(wgsLat, wgsLng) {
  var a = 6378245.0, ee = 0.00669342162296594323, pi = Math.PI;
  var lat = wgsLat, lng = wgsLng;
  if (lng < 72.004 || lng > 137.8347 || lat < 0.8293 || lat > 55.8271) return [lat, lng];
  function tLat(x, y) {
    var r = -100+2*x+3*y+0.2*y*y+0.1*x*y+0.2*Math.sqrt(Math.abs(x));
    r += (20*Math.sin(6*x*pi)+20*Math.sin(2*x*pi))*2/3;
    r += (20*Math.sin(y*pi)+40*Math.sin(y/3*pi))*2/3;
    r += (160*Math.sin(y/12*pi)+320*Math.sin(y*pi/30))*2/3;
    return r;
  }
  function tLng(x, y) {
    var r = 300+x+2*y+0.1*x*x+0.1*x*y+0.1*Math.sqrt(Math.abs(x));
    r += (20*Math.sin(6*x*pi)+20*Math.sin(2*x*pi))*2/3;
    r += (20*Math.sin(x*pi)+40*Math.sin(x/3*pi))*2/3;
    r += (150*Math.sin(x/12*pi)+300*Math.sin(x/30*pi))*2/3;
    return r;
  }
  var dLat = tLat(lng-105, lat-35);
  var dLng = tLng(lng-105, lat-35);
  var radLat = lat/180*pi;
  var magic = Math.sin(radLat);
  magic = 1 - ee*magic*magic;
  var sqrtMagic = Math.sqrt(magic);
  dLat = (dLat*180)/((a*(1-ee))/(magic*sqrtMagic)*pi);
  dLng = (dLng*180)/(a/sqrtMagic*Math.cos(radLat)*pi);
  return [lat+dLat, lng+dLng];
}
function _onLocSuccess(pos) {
  var raw = _wgs2gcj(pos.coords.latitude, pos.coords.longitude);
  _userLat = raw[0];
  _userLng = raw[1];
  if (!_userMarker) {
    _userMarker = L.marker([_userLat, _userLng], {icon: _userLocIcon, zIndexOffset: 500}).addTo(map);
    _userMarker.bindPopup('<div style="padding:8px 12px;font-size:13px;font-weight:600;color:#3b7cff">📍 我的位置</div>', {closeButton: false});
  } else {
    _userMarker.setLatLng([_userLat, _userLng]);
  }
}
function _onLocError(err) {
  console.warn('Location error:', err.code, err.message);
}
function promptLocation() {
  if (!navigator.geolocation || _locPrompted) return;
  _locPrompted = true;
  _locWatchId = navigator.geolocation.watchPosition(_onLocSuccess, _onLocError, {enableHighAccuracy: true, timeout: 15000, maximumAge: 60000});
}
promptLocation();
function getDistance(lat, lng) {
  if (_userLat === null) return '';
  var R = 6371;
  var dLat = (lat - _userLat) * Math.PI / 180;
  var dLng = (lng - _userLng) * Math.PI / 180;
  var a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(_userLat * Math.PI/180) * Math.cos(lat * Math.PI/180) * Math.sin(dLng/2) * Math.sin(dLng/2);
  var d = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  if (d < 1) return (d * 1000).toFixed(0) + 'm';
  return d.toFixed(1) + 'km';
}

// --- Review text ---

  return poi.review || '';
}

// --- Refresh popup content dynamically ---
function refreshPopup(pc, adcode) {
  var d = poiData[adcode];
  if (!d) return;
  var poiItems = pc.querySelectorAll('.poi-item');
  poiItems.forEach(function(el, i) {
    var poi = d.pois[i];
    if (!poi) return;
    var distEl = el.querySelector('.poi-distance');
    var dist = getDistance(poi.lat, poi.lng);
    if (dist) {
      if (distEl) {
        distEl.textContent = dist;
      } else {
        var nameEl = el.querySelector('.poi-name');
        if (nameEl) {
          var newEl = document.createElement('span');
          newEl.className = 'poi-distance';
          newEl.textContent = dist;
          nameEl.appendChild(newEl);
        }
      }
    }
    var statusEl = el.querySelector('.poi-status');
    var status = isOpen(poi);
    if (statusEl && status !== null) {
      statusEl.className = 'poi-status ' + (status ? 'open' : 'closed');
      statusEl.textContent = status ? '开园中' : '已闭园';
    }
  });
}
